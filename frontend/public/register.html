<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mediloop · Crear cuenta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #111827;
        padding: 1.5rem 1rem;
      }
      .card {
        width: 100%;
        max-width: 440px;
        background: #fff;
        border-radius: 24px;
        padding: 2.4rem 2.2rem 2rem;
        box-shadow: 0 18px 45px rgba(15,23,42,0.35);
      }
      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1.4rem;
        transform: translateX(-12px);
      }
      .logo-mark { width: 36px; height: 36px; flex-shrink: 0; }
      .logo-mark svg { width: 100%; height: 100%; display: block; }
      .logo-text { font-weight: 700; font-size: 1.25rem; color: #4f46e5; letter-spacing: -0.02em; }
      h2 { text-align: center; font-weight: 600; font-size: 1.1rem; margin: 0 0 0.25rem; }
      .subtitle { text-align: center; font-size: 0.85rem; color: #6b7280; margin-bottom: 1.6rem; }
      label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.3rem; color: #374151; }
      .field { margin-bottom: 1rem; }
      .field-input { position: relative; }
      .field-input svg { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.55; }
      .input {
        width: 100%;
        padding: 0.7rem 0.9rem 0.7rem 2.3rem;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .input:focus { border-color: #4f46e5; }
      .input.error { border-color: #ef4444; }
      .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
      .field-row .field { margin-bottom: 0; }
      .role-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.4rem; }
      .role-btn {
        border-radius: 14px;
        border: 1px solid #e5e7eb;
        padding: 0.85rem 0.75rem;
        font-size: 0.9rem;
        background: #f9fafb;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        transition: border-color 0.2s, background 0.2s, transform 0.2s;
      }
      .role-btn:hover { border-color: #c7d2fe; background: #f3f4f6; transform: translateY(-2px); }
      .role-btn.active { border-color: #4f46e5; background: #eef2ff; }
      .role-icon { width: 28px; height: 28px; color: #4b5563; }
      .role-icon svg { width: 100%; height: 100%; }
      .role-title { font-weight: 500; font-size: 0.9rem; color: #374151; }
      .submit-btn {
        margin-top: 1.2rem;
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 0.85rem 1.2rem;
        font-weight: 600;
        font-size: 0.95rem;
        background: linear-gradient(90deg, #2563eb, #4f46e5);
        color: #fff;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .links { margin-top: 1rem; font-size: 0.82rem; text-align: center; color: #6b7280; }
      .links a { color: #4f46e5; text-decoration: none; }
      .links a:hover { text-decoration: underline; }
      .msg { margin-top: 0.75rem; padding: 0.6rem 0.9rem; border-radius: 10px; font-size: 0.85rem; display: none; }
      .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
      .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
      .hint { font-size: 0.78rem; color: #9ca3af; margin-top: 0.25rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="18" y="6" width="16" height="16" rx="4" fill="#c2cfff" opacity="0.9"/>
            <rect x="12" y="12" width="16" height="16" rx="4" fill="#8a9eff" opacity="0.95"/>
            <rect x="6" y="18" width="16" height="16" rx="4" fill="#4f46e5"/>
          </svg>
        </div>
        <span class="logo-text">Mediloop</span>
      </div>
      <h2>Crear cuenta UJI</h2>
      <div class="subtitle">Solo se permite el correo institucional @uji.es</div>

      <form id="reg-form">
        <div class="field-row">
          <div class="field">
            <label for="nombre">Nombre</label>
            <div class="field-input">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Zm0 2c-2.67 0-8 1.34-8 4v1h16v-1c0-2.66-5.33-4-8-4Z"/></svg>
              <input id="nombre" class="input" type="text" placeholder="Ana" autocomplete="given-name" required />
            </div>
          </div>
          <div class="field">
            <label for="apellidos">Apellidos</label>
            <div class="field-input">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Zm0 2c-2.67 0-8 1.34-8 4v1h16v-1c0-2.66-5.33-4-8-4Z"/></svg>
              <input id="apellidos" class="input" type="text" placeholder="Martínez García" autocomplete="family-name" required />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="email">Correo UJI</label>
          <div class="field-input">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"/></svg>
            <input id="email" class="input" type="email" placeholder="al123456@uji.es" autocomplete="email" required />
          </div>
          <div class="hint">Debe terminar en @uji.es</div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="field-input">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17 8V7a5 5 0 0 0-10 0v1H5v12h14V8h-2Zm-8-1a3 3 0 0 1 6 0v1H9V7Zm8 11H7v-8h10v8Z"/></svg>
            <input id="password" class="input" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required />
          </div>
        </div>

        <div class="field">
          <label>Rol en Mediloop</label>
          <div class="role-row">
            <button type="button" class="role-btn" data-role="tutor">
              <span class="role-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
              </span>
              <span class="role-title">Tutor</span>
            </button>
            <button type="button" class="role-btn" data-role="student">
              <span class="role-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 14l9-5-9-5-9 5 9 5z"/>
                  <path d="M12 14l6.16-3.422a12.083 12.083 0 0 1 .665 6.479A11.952 11.952 0 0 0 12 20.055a11.952 11.952 0 0 0-6.824-2.998 12.078 12.078 0 0 1 .665-6.479L12 14z"/>
                </svg>
              </span>
              <span class="role-title">Alumno</span>
            </button>
          </div>
        </div>

        <div id="msg" class="msg"></div>
        <button type="submit" class="submit-btn" id="submit-btn">Crear cuenta</button>
        <div class="links">
          ¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a>
        </div>
      </form>
    </div>

    <script>
      (function () {
        var API_BASE = window.location.hostname === "localhost" ? "http://localhost:4000/api" : "/api";
        var selectedRole = "";
        var msgEl = document.getElementById("msg");
        var submitBtn = document.getElementById("submit-btn");

        document.querySelectorAll(".role-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.querySelectorAll(".role-btn").forEach(function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            selectedRole = btn.getAttribute("data-role");
          });
        });

        function showMsg(type, text) {
          msgEl.className = "msg " + type;
          msgEl.textContent = text;
        }

        document.getElementById("reg-form").addEventListener("submit", function (e) {
          e.preventDefault();
          var nombre    = document.getElementById("nombre").value.trim();
          var apellidos = document.getElementById("apellidos").value.trim();
          var email     = document.getElementById("email").value.trim();
          var pass      = document.getElementById("password").value;

          if (!nombre || !apellidos) { showMsg("error", "Introduce nombre y apellidos."); return; }
          if (!email) { showMsg("error", "Introduce tu correo @uji.es."); return; }
          if (!email.toLowerCase().endsWith("@uji.es")) { showMsg("error", "El correo debe ser @uji.es."); return; }
          if (!selectedRole) { showMsg("error", "Selecciona tu rol."); return; }
          if (pass.length < 6) { showMsg("error", "La contraseña debe tener al menos 6 caracteres."); return; }

          submitBtn.disabled = true;
          submitBtn.textContent = "Creando cuenta...";
          msgEl.className = "msg";

          fetch(API_BASE + "/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, name: nombre + " " + apellidos, password: pass, role: selectedRole })
          })
            .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, data: d }; }); })
            .then(function (result) {
              if (!result.ok) { showMsg("error", result.data.message || "Error al crear la cuenta."); return; }
              localStorage.setItem("mediloop.session", JSON.stringify(result.data));
              showMsg("success", "¡Cuenta creada! Redirigiendo...");
              setTimeout(function () {
                window.location.href = result.data.user.role === "tutor" ? "tutores.html" : "alumnos.html";
              }, 800);
            })
            .catch(function () { showMsg("error", "No se pudo conectar con el servidor."); })
            .finally(function () {
              submitBtn.disabled = false;
              submitBtn.textContent = "Crear cuenta";
            });
        });
      })();
    </script>
  </body>
</html>
