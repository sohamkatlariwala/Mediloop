<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>404 · Página no encontrada · Mediloop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #1e1b4b 0%, #2563eb 60%, #4f46e5 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        color: #fff;
      }
      .logo-mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.25rem;
      }
      .logo-mark svg { width: 100%; height: 100%; display: block; }
      .logo-text {
        font-size: 1.1rem;
        font-weight: 700;
        color: rgba(255,255,255,0.9);
        margin-bottom: 2.5rem;
        letter-spacing: 0.01em;
      }
      .code {
        font-size: 6rem;
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.55));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 600;
        color: rgba(255,255,255,0.95);
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 0.95rem;
        color: rgba(255,255,255,0.7);
        max-width: 380px;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .btn-back {
        display: inline-block;
        padding: 0.8rem 2rem;
        border-radius: 12px;
        background: rgba(255,255,255,0.15);
        border: 1.5px solid rgba(255,255,255,0.35);
        color: #fff;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
        transition: background 0.2s;
        backdrop-filter: blur(4px);
      }
      .btn-back:hover { background: rgba(255,255,255,0.25); }
      .btn-home {
        display: inline-block;
        padding: 0.8rem 2rem;
        border-radius: 12px;
        background: #fff;
        color: #2563eb;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 700;
        margin-right: 0.75rem;
        transition: opacity 0.2s;
      }
      .btn-home:hover { opacity: 0.9; }
      .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    </style>
  </head>
  <body>
    <div class="logo-mark">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><filter id="lb"><feGaussianBlur stdDeviation="1.5"/></filter></defs>
        <rect x="18" y="6" width="16" height="16" rx="4" fill="#c2cfff" opacity="0.95"/>
        <rect x="12" y="12" width="16" height="16" rx="4" fill="#8a9eff" opacity="0.95"/>
        <rect x="6" y="18" width="16" height="16" rx="4" fill="#4f46e5" filter="url(#lb)"/>
      </svg>
    </div>
    <div class="logo-text">Mediloop</div>
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o ha sido movida. Comprueba la URL o vuelve al inicio.</p>
    <div class="actions">
      <a href="index.html" class="btn-home">Ir al inicio</a>
      <a href="javascript:history.back()" class="btn-back">Volver atrás</a>
    </div>
  </body>
</html>
